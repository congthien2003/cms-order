name: .NET CI/CD with Docker

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

env:
    PROJECT_NAME: "Host" # Folder chứa .csproj
    DOTNET_VERSION: "8.0.x"
    IMAGE_NAME: "soa-api" # tên image
    REGISTRY: "ghcr.io/${{ github.repository_owner }}"

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            # --------------------------
            # CHECKOUT SOURCE
            # --------------------------
            - name: Checkout code
              uses: actions/checkout@v4

            # --------------------------
            # SETUP DOTNET
            # --------------------------
            - name: Setup .NET SDK
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: ${{ env.DOTNET_VERSION }}

            # --------------------------
            # RESTORE + BUILD
            # --------------------------
            - name: Restore dependencies
              run: dotnet restore

            - name: Build project
              run: dotnet build $PROJECT_NAME/$PROJECT_NAME.csproj -c Release --no-restore

            # --------------------------
            # TEST
            # --------------------------
            - name: Run tests
              run: dotnet test --no-build

    docker:
        runs-on: ubuntu-latest
        needs: build
        permissions:
            packages: write
            contents: read

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            # --------------------------
            # LOGIN GHCR
            # --------------------------
            - name: Log in to Container Registry
              uses: docker/login-action@v2
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            # --------------------------
            # BUILD & PUSH DOCKER IMAGE
            # --------------------------
            - name: Build and push Docker image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  tags: |
                      ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
                      ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

    deploy:
        runs-on: ubuntu-latest
        needs: docker
        if: github.ref == 'refs/heads/main'
        steps:
            - name: Deploy to server (placeholder)
              run: |
                  echo "Implement deploy script here..."
                  # SSH deploy example:
                  # ssh user@server "docker pull ghcr.io/owner/app:latest && docker compose up -d"
