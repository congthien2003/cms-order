name: SOA-UI CI/CD Pipeline

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main]

permissions:
    contents: read
    packages: write

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Build project
              run: npm run build

    # Build & Deploy
    build-and-deploy:
        needs: []
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main'

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Build production
              run: npm run build:prod

            - name: Run bundle analyzer
              run: npm run build:analyze

            - name: Build Docker image
              run: docker build -t angular-starter-kit:${{ github.sha }} .

            - name: Log in to Container Registry
              uses: docker/login-action@v2
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Push Docker image
              run: |
                  docker tag angular-starter-kit:${{ github.sha }} ghcr.io/${{ github.repository }}:${{ github.sha }}
                  docker tag angular-starter-kit:${{ github.sha }} ghcr.io/${{ github.repository }}:latest
                  docker push ghcr.io/${{ github.repository }}:${{ github.sha }}
                  docker push ghcr.io/${{ github.repository }}:latest

            # Deploy to staging
            - name: Deploy to staging
              if: github.ref == 'refs/heads/main'
              run: |
                  echo "Deploying to staging environment..."
                  # Add your deployment commands here

    # Deploy to Production
    deploy-production:
        needs: [build-and-deploy]
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main'
        environment: production

        steps:
            - name: Deploy to production
              run: |
                  echo "Deploying to production environment..."
                  # Add your production deployment commands here
